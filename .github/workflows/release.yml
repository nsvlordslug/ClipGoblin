name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install LLVM and CMake
        run: |
          choco install llvm cmake --yes
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Download FFmpeg
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          tar -xf ffmpeg.zip --strip-components=2 */bin/ffmpeg.exe
          mv ffmpeg.exe src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          rm ffmpeg.zip

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup signing key
        shell: bash
        run: |
          echo "TAURI_SIGNING_PRIVATE_KEY<<ENDOFKEY" >> $GITHUB_ENV
          echo "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" >> $GITHUB_ENV
          echo "ENDOFKEY" >> $GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=" >> $GITHUB_ENV

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          GITHUB_BUG_TOKEN: ${{ secrets.GITHUB_BUG_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        with:
          tagName: v__VERSION__
          releaseName: 'ClipGoblin v__VERSION__'
          releaseBody: 'See the changelog for details.'
          releaseDraft: true
          prerelease: false
          args: --features standalone

      - name: Create update artifacts
        shell: bash
        run: |
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          echo "Version: $VERSION"

          NSIS_DIR="src-tauri/target/release/bundle/nsis"
          NSIS_EXE="ClipGoblin_${VERSION}_x64-setup.exe"
          NSIS_ZIP="${NSIS_EXE%.exe}.nsis.zip"

          # Create zip
          cd "$NSIS_DIR"
          7z a -tzip "$NSIS_ZIP" "$NSIS_EXE"
          cd -

          # Sign
          KEY_FILE="$RUNNER_TEMP/tauri-signing.key"
          echo "$TAURI_SIGNING_PRIVATE_KEY" > "$KEY_FILE"
          TAURI_SIGNING_PRIVATE_KEY_PATH="$KEY_FILE" TAURI_SIGNING_PRIVATE_KEY_PASSWORD="" npx @tauri-apps/cli signer sign "$NSIS_DIR/$NSIS_ZIP"

          # Read signature
          NSIS_SIG=$(cat "$NSIS_DIR/${NSIS_ZIP}.sig")

          # Create latest.json in a place the action can find it
          cat > src-tauri/target/release/latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "See the changelog for details.",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$NSIS_SIG",
                "url": "https://github.com/nsvlordslug/ClipGoblin/releases/download/v${VERSION}/${NSIS_ZIP}"
              }
            }
          }
          ENDJSON

          echo "=== latest.json ==="
          cat src-tauri/target/release/latest.json

      - name: Upload update artifacts
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          tag_name: v1.0.1
          files: |
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
