name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install LLVM and CMake
        run: |
          choco install llvm cmake --yes
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        # v0.6 = Node 24 runtime (required from 2026-06-16); same inputs as v0.5,
        # verified drop-in for tagName/releaseName/releaseBody/releaseDraft/
        # prerelease/includeUpdaterJson/args (action.yml @ v0.6).
        uses: tauri-apps/tauri-action@v0.6
        env:
          # ── v1.5.1 portable-CPU fix ────────────────────────────────────────
          # whisper-rs-sys 0.15.0's build.rs forwards any GGML_* env var as a
          # -DGGML_* cmake define into the bundled whisper.cpp (v1.8.3). Without
          # these, GGML_NATIVE defaults ON and the AVX-512-capable GitHub runner
          # bakes AVX-512 into the static whisper build — which then crashes with
          # STATUS_ILLEGAL_INSTRUCTION (0xc000001d) on consumer CPUs that lack
          # AVX-512 (e.g. Intel 12th-gen Alder Lake). Pin a portable AVX2 baseline:
          #   GGML_NATIVE=OFF  -> don't optimize for the (AVX-512) build host
          #   GGML_AVX2=ON     -> /arch:AVX2 (implies AVX, FMA, F16C on MSVC)
          #   GGML_AVX512=OFF  -> never emit AVX-512 (zmm/EVEX) instructions
          # AVX2/FMA/F16C are present on every x86 CPU since ~2013 (incl. Alder Lake).
          GGML_NATIVE: "OFF"
          GGML_AVX2: "ON"
          GGML_AVX512: "OFF"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing uses the passwordless v3 keypair (clipgoblin-nopass.key,
          # key ID 8DD0C3CC61AA1D43). The earlier v2 keypair (5319EC36) was
          # protected by a password we no longer have, which broke the
          # v1.3.7/v1.3.8 release builds at the updater-sign step. Switching
          # back to the nopass key removes the password failure mode entirely.
          # Pubkey in tauri.conf.json is the matching public counterpart.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Note the secret name (BUG_REPORT_PAT) differs from the env var
          # (GITHUB_BUG_TOKEN). GitHub Actions forbids secret names starting
          # with GITHUB_, so we remap on the way into the build. The Rust
          # code in commands/bug_report.rs still reads option_env!("GITHUB_BUG_TOKEN").
          GITHUB_BUG_TOKEN: ${{ secrets.BUG_REPORT_PAT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Required for AuthProxy::new() — embeds the proxy key at compile
          # time via option_env! so release builds can talk to the Cloudflare
          # auth-proxy Worker (Twitch / YouTube / TikTok token exchange).
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'ClipGoblin v__VERSION__'
          releaseBody: 'See the changelog for details.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: -- --no-default-features --features asset-protocol,standalone
