name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install LLVM and CMake
        run: |
          choco install llvm cmake --yes
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signing uses the passwordless v3 keypair (clipgoblin-nopass.key,
          # key ID 8DD0C3CC61AA1D43). The earlier v2 keypair (5319EC36) was
          # protected by a password we no longer have, which broke the
          # v1.3.7/v1.3.8 release builds at the updater-sign step. Switching
          # back to the nopass key removes the password failure mode entirely.
          # Pubkey in tauri.conf.json is the matching public counterpart.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # Note the secret name (BUG_REPORT_PAT) differs from the env var
          # (GITHUB_BUG_TOKEN). GitHub Actions forbids secret names starting
          # with GITHUB_, so we remap on the way into the build. The Rust
          # code in commands/bug_report.rs still reads option_env!("GITHUB_BUG_TOKEN").
          GITHUB_BUG_TOKEN: ${{ secrets.BUG_REPORT_PAT }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Required for AuthProxy::new() — embeds the proxy key at compile
          # time via option_env! so release builds can talk to the Cloudflare
          # auth-proxy Worker (Twitch / YouTube / TikTok token exchange).
          PROXY_API_KEY: ${{ secrets.PROXY_API_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: 'ClipGoblin v__VERSION__'
          releaseBody: 'See the changelog for details.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: -- --no-default-features --features asset-protocol,standalone
