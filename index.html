<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipGoblin</title>
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; background: #07060c; }
      .startup-shell { display: grid; place-items: center; width: 100%; height: 100%; color: #d8d4e3; font: 600 13px "Segoe UI", sans-serif; }
      .startup-shell > div { display: flex; align-items: center; gap: 10px; }
      .startup-spinner { width: 16px; height: 16px; box-sizing: border-box; border: 2px solid #33284b; border-top-color: #a78bfa; border-radius: 50%; animation: startup-spin .8s linear infinite; }
      @keyframes startup-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="startup-shell" role="status"><div><span class="startup-spinner"></span>Opening ClipGoblin</div></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
