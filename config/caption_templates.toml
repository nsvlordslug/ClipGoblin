# ClipGoblin Free-path caption template matrix
# Phase 12 Wave 3b — emotion × context grid for synthesize_event() matrix lookup.
#
# Loaded at compile time via `include_str!` in src-tauri/src/post_captions.rs.
# Parsed once at first use and cached via Lazy.
#
# Emotions (rows):  shock, hype, funny, rage, panic
# Contexts (cols):  ace, death, clutch, fail, reaction, chase, explosion
#
# This file only covers the top ~15 cells that appear commonly in real clips.
# Uncovered (emotion, context) pairs fall through to the hardcoded rules in
# synthesize_event() — zero regression risk.
#
# Slot placeholders supported in Wave 3b:
#   {time_est}      — generic short-duration hint, e.g. "5"
#   {kill_count}    — generic kill count hint, e.g. "3"
#
# Broader slots (game name, streamer, enemy, weapon) land with Phase 1
# per-game TOML configs.
#
# To add a template: append `[[templates]]` with emotion, context, text.
# Emotion + context must be spelled exactly as used by infer_emotion()
# and infer_context() in post_captions.rs.

# ───────────────────────────────────────────────────────────────
# SHOCK — disbelief, speechless, "did that really happen"
# ───────────────────────────────────────────────────────────────

[[templates]]
emotion = "shock"
context = "ace"
text = "went from zero to {kill_count} in {time_est} seconds flat"

[[templates]]
emotion = "shock"
context = "ace"
text = "clean {kill_count}-for-{kill_count} through the smoke, still processing this"

[[templates]]
emotion = "shock"
context = "ace"
text = "didn't think that was possible and then it was"

[[templates]]
